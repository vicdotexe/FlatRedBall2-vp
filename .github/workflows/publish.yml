name: Publish FlatRedBall2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override, e.g. 0.2.0-preview.1 (leave blank to auto-increment preview number)'
        required: false
        default: ''

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Using manual version: ${{ github.event.inputs.version }}"
            exit 0
          fi

          # Query NuGet for the latest version of the primary package
          VERSIONS=$(curl -sf https://api.nuget.org/v3-flatcontainer/flatredball2.monogame/index.json | jq -r '.versions[-1]')
          if [ -z "$VERSIONS" ] || [ "$VERSIONS" = "null" ]; then
            echo "::error::Could not fetch latest version from NuGet"
            exit 1
          fi

          LATEST="$VERSIONS"
          echo "Latest NuGet version: $LATEST"

          # Increment the last numeric segment (e.g. 0.1.0-preview.3 -> 0.1.0-preview.4)
          PREFIX="${LATEST%.*}"
          LAST="${LATEST##*.}"
          NEXT="$PREFIX.$((LAST + 1))"

          echo "version=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Auto-incremented to: $NEXT"

  publish:
    needs: resolve-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - packageId: FlatRedBall2.MonoGame
            targetFrameworks: net10.0
          - packageId: FlatRedBall2.Kni
            targetFrameworks: net8.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/FlatRedBall2.csproj

      - name: Build and Pack (${{ matrix.packageId }})
        run: >
          dotnet pack src/FlatRedBall2.csproj
          -c Release
          -p:PackageId=${{ matrix.packageId }}
          -p:TargetFrameworks=${{ matrix.targetFrameworks }}
          -p:PackageVersion=${{ needs.resolve-version.outputs.version }}
          -o out

      - name: Publish to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-templates:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pack Templates
        run: >
          dotnet pack templates/FlatRedBall2.Templates.csproj
          -c Release
          -p:PackageVersion=${{ needs.resolve-version.outputs.version }}
          -o out

      - name: Publish Templates to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-animation-editor:
    needs: resolve-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - packageId: AnimationEditor.MonoGame
            targetFramework: net10.0
            flatredballPackageId: FlatRedBall2.MonoGame
          - packageId: AnimationEditor.KNI
            targetFramework: net8.0
            flatredballPackageId: FlatRedBall2.Kni
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore AnimationEditor dependencies
        run: >
          dotnet restore tools/AnimationEditorAvalonia/src/AnimationEditor.Core/AnimationEditor.Core.csproj
          -p:AnimationEditorTargetFramework=${{ matrix.targetFramework }}
          -p:FlatRedBallDependencyPackageId=${{ matrix.flatredballPackageId }}
          -p:FlatRedBallDependencyVersion=${{ needs.resolve-version.outputs.version }}

      - name: Build and Pack (${{ matrix.packageId }})
        run: >
          dotnet pack tools/AnimationEditorAvalonia/src/AnimationEditor.Core/AnimationEditor.Core.csproj
          -c Release
          -p:AnimationEditorPackageId=${{ matrix.packageId }}
          -p:AnimationEditorPackageVersion=${{ needs.resolve-version.outputs.version }}
          -p:AnimationEditorTargetFramework=${{ matrix.targetFramework }}
          -p:FlatRedBallDependencyPackageId=${{ matrix.flatredballPackageId }}
          -p:FlatRedBallDependencyVersion=${{ needs.resolve-version.outputs.version }}
          -o out

      - name: Publish to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

  publish-animationchain:
    needs: resolve-version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore AnimationChain dependencies
        run: dotnet restore src/AnimationChain.MonoGame/AnimationChain.MonoGame.csproj

      - name: Pack AnimationChain package
        run: >
          dotnet pack src/AnimationChain.MonoGame/AnimationChain.MonoGame.csproj
          -c Release
          -p:PackageVersion=${{ needs.resolve-version.outputs.version }}
          -o out

      - name: Publish AnimationChain to NuGet
        run: dotnet nuget push "out/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
