name: Build and Release Animation Editor

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: Type
        type: choice
        options: [release, prerelease, test]
        default: test
        required: true

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest

    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      title: ${{ steps.meta.outputs.title }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      channel: ${{ steps.meta.outputs.channel }}

    steps:
      - name: Compute version, tag, title, and release metadata
        id: meta
        shell: pwsh
        run: |
          $now = Get-Date
          $kind = "${{ github.event.inputs.release_kind }}"
          $refName = "${{ github.ref_name }}"
          $runNumber = $env:GITHUB_RUN_NUMBER

          # Release and prerelease are intended to represent main.
          # Test may run from any branch selected in the Actions UI.
          if ($kind -in @('release', 'prerelease') -and $refName -ne 'main') {
            throw "'$kind' releases must be run from main. Selected ref: '$refName'."
          }

          # Valid SemVer and unique per workflow run.
          # Example: 2026.7.123
          $version = "$($now.Year).$($now.Month).$runNumber"

          switch ($kind) {
            'release' {
              $prefix = 'Release'
              $isPrerelease = 'false'
              $channel = 'release'
            }

            'prerelease' {
              $prefix = 'PreRelease'
              $isPrerelease = 'true'
              $channel = 'prerelease'
            }

            'test' {
              $prefix = 'Test'
              $isPrerelease = 'true'
              $channel = 'test'
            }

            default {
              throw "Unknown release kind: $kind"
            }
          }

          $testBranchSuffix = if ($kind -eq 'test') {
            " [$refName]"
          }
          else {
            ''
          }

          $title = "Animation Editor $prefix " +
                   $now.ToString('MMMM d, yyyy') +
                   "$testBranchSuffix (Build $runNumber)"

          $tag = "ae-$prefix" +
                 "_" + $now.ToString('MMMM_dd_yyyy') +
                 "-$runNumber"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=$title" >> $env:GITHUB_OUTPUT
          "prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT

  # Uncomment when you are ready to restore test gating.
  #
  # test:
  #   runs-on: ubuntu-latest
  #
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: Install .NET SDK
  #       uses: actions/setup-dotnet@v4
  #       with:
  #         dotnet-version: '10.0.x'
  #
  #     - name: Test AnimationEditor solution
  #       run: dotnet test tools/AnimationEditorAvalonia/AnimationEditorAvalonia.slnx -c Release

  build:
    needs: [meta]
    # Change to [meta, test] after restoring the test job.

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            mainExe: AnimationEditor.exe
            icon: tools/AnimationEditorAvalonia/src/AnimationEditor.App/Assets/icons/AppIcon.ico

          - rid: linux-x64
            os: ubuntu-latest
            mainExe: AnimationEditor
            icon: tools/AnimationEditorAvalonia/src/AnimationEditor.App/Assets/icons/achx-icon-256.png

          - rid: osx-x64
            os: macos-latest
            mainExe: AnimationEditor
            icon: tools/AnimationEditorAvalonia/src/AnimationEditor.App/Assets/icons/AppIcon.icns

          - rid: osx-arm64
            os: macos-latest
            mainExe: AnimationEditor
            icon: tools/AnimationEditorAvalonia/src/AnimationEditor.App/Assets/icons/AppIcon.icns

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: >
          dotnet restore
          tools/AnimationEditorAvalonia/src/AnimationEditor.App/AnimationEditor.App.csproj
          -r ${{ matrix.rid }}

      - name: Publish (${{ matrix.rid }})
        run: >
          dotnet publish
          tools/AnimationEditorAvalonia/src/AnimationEditor.App/AnimationEditor.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ needs.meta.outputs.version }}
          -o dist/publish

      - name: Mark binary executable (non-Windows)
        if: matrix.os != 'windows-latest'
        run: chmod +x dist/publish/${{ matrix.mainExe }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Package Velopack release
        shell: pwsh
        run: |
          $channel = "${{ matrix.rid }}-${{ needs.meta.outputs.channel }}"

          vpk pack `
            --packId frb.animation.editor `
            --packTitle "AnimationEditor" `
            --packVersion ${{ needs.meta.outputs.version }} `
            --packDir dist/publish `
            --mainExe ${{ matrix.mainExe }} `
            --runtime ${{ matrix.rid }} `
            --channel $channel `
            --icon "${{ matrix.icon }}" `
            --outputDir dist/out

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Publish to Velopack Flow
        shell: pwsh
        env:
          VPK_API_KEY: ${{ secrets.VELOPACK_FLOW_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VPK_API_KEY)) {
            throw "VELOPACK_FLOW_API_KEY was not provided."
          }

          $channel = "${{ matrix.rid }}-${{ needs.meta.outputs.channel }}"

          vpk publish `
            --outputDir dist/out `
            --channel $channel

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Stage GitHub Release assets
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $channel = "$rid-${{ needs.meta.outputs.channel }}"
          $friendlyPrefix = "AnimationEditor-$channel"

          $githubReleaseDirectory = "dist/github-release"
          New-Item -ItemType Directory -Force -Path $githubReleaseDirectory | Out-Null

          $releaseAssets = @(
            Get-ChildItem -Path dist/out -File |
              Where-Object {
                $_.Name -match '(-Setup\.(exe|pkg)|-Portable\.zip|\.AppImage)$'
              }
          )

          $expectedCount = if ($rid -eq 'linux-x64') { 1 } else { 2 }

          if ($releaseAssets.Count -ne $expectedCount) {
            $foundNames = $releaseAssets.Name -join ', '
            throw "Expected $expectedCount user-facing artifact(s) for '$rid', found $($releaseAssets.Count): $foundNames"
          }

          foreach ($asset in $releaseAssets) {
            $suffix =
              if ($asset.Name -match '-Setup\.exe$') {
                '-Setup.exe'
              }
              elseif ($asset.Name -match '-Setup\.pkg$') {
                '-Setup.pkg'
              }
              elseif ($asset.Name -match '-Portable\.zip$') {
                '-Portable.zip'
              }
              elseif ($asset.Name -match '\.AppImage$') {
                '.AppImage'
              }
              else {
                throw "Unexpected release asset: $($asset.Name)"
              }

            $destination = Join-Path $githubReleaseDirectory "$friendlyPrefix$suffix"

            Copy-Item `
              -Path $asset.FullName `
              -Destination $destination `
              -Force
          }

          Get-ChildItem -Path $githubReleaseDirectory -File |
            ForEach-Object { Write-Host $_.FullName }

      - name: Upload GitHub Release artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-release-${{ matrix.rid }}
          path: dist/github-release/*
          if-no-files-found: error
          retention-days: 7

  # Test builds are Flow-only. This avoids creating 50 GitHub Releases/month.
  #
  # Release and prerelease builds get one normal human-facing GitHub Release
  # containing installers / portable packages only.
  release:
    if: ${{ github.event.inputs.release_kind != 'test' }}
    needs: [meta, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all GitHub Release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: github-release-*
          path: dist/github-release
          merge-multiple: true

      - name: List GitHub Release assets
        run: find dist/github-release -type f -print

      - name: Create GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = @(
            Get-ChildItem -Path dist/github-release -File -Recurse |
              Sort-Object Name
          )

          if ($assets.Count -ne 7) {
            $foundNames = $assets.Name -join ', '
            throw "Expected 7 GitHub Release assets, found $($assets.Count): $foundNames"
          }

          $arguments = @(
            'release',
            'create',
            '${{ needs.meta.outputs.tag }}',
            '--repo',
            '${{ github.repository }}',
            '--target',
            '${{ github.sha }}',
            '--title',
            '${{ needs.meta.outputs.title }}'
          )

          if ('${{ needs.meta.outputs.prerelease }}' -eq 'true') {
            $arguments += '--prerelease'
          }

          $arguments += $assets.FullName

          gh @arguments

          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }