name: Build and Release Animation Editor

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: 'Type'
        type: choice
        options: [release, prerelease, test]
        default: test
        required: true

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version:    ${{ steps.meta.outputs.version }}
      tag:        ${{ steps.meta.outputs.tag }}
      title:      ${{ steps.meta.outputs.title }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      draft:      ${{ steps.meta.outputs.draft }}
      publish:    ${{ steps.meta.outputs.publish }}
      channel:    ${{ steps.meta.outputs.channel }}

    steps:
      - name: Compute version, tag, title, and release metadata
        id: meta
        shell: pwsh
        run: |
          $now = Get-Date
          $kind = "${{ github.event.inputs.release_kind }}"

          # SemVer-compatible and unique for each distinct workflow run.
          # Example: 2026.7.123
          $version = "$($now.Year).$($now.Month).$($env:GITHUB_RUN_NUMBER)"

          switch ($kind) {
            'release' {
              $prefix = 'Release'
              $prerelease = 'false'
              $draft = 'false'
              $publish = 'true'
              $channel = 'release'
            }

            'prerelease' {
              $prefix = 'PreRelease'
              $prerelease = 'true'
              $draft = 'false'
              $publish = 'true'
              $channel = 'prerelease'
            }

            'test' {
              $prefix = 'Test'
              $prerelease = 'true'
              $draft = 'true'
              $publish = 'false'
              $channel = 'test'
            }

            default {
              throw "Unknown release kind: $kind"
            }
          }

          $title = "$prefix " + $now.ToString('MMMM d, yyyy')
          $tag = "ae-${prefix}_" + $now.ToString('MMMM_dd_yyyy') + "-$($env:GITHUB_RUN_NUMBER)"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=Animation Editor $title" >> $env:GITHUB_OUTPUT
          "prerelease=$prerelease" >> $env:GITHUB_OUTPUT
          "draft=$draft" >> $env:GITHUB_OUTPUT
          "publish=$publish" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT

  # test:
  #   runs-on: ubuntu-latest

  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4

  #     - name: Install .NET SDK
  #       uses: actions/setup-dotnet@v4
  #       with:
  #         dotnet-version: '10.0.x'

  #     - name: Test AnimationEditor solution
  #       run: dotnet test tools/AnimationEditorAvalonia/AnimationEditorAvalonia.slnx -c Release

  build:
    needs: [meta] #[meta, test]

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            mainExe: AnimationEditor.exe

          - rid: linux-x64
            os: ubuntu-latest
            mainExe: AnimationEditor

          - rid: osx-x64
            os: macos-latest
            mainExe: AnimationEditor

          - rid: osx-arm64
            os: macos-latest
            mainExe: AnimationEditor

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: >
          dotnet restore
          tools/AnimationEditorAvalonia/src/AnimationEditor.App/AnimationEditor.App.csproj
          -r ${{ matrix.rid }}

      - name: Publish (${{ matrix.rid }})
        run: >
          dotnet publish
          tools/AnimationEditorAvalonia/src/AnimationEditor.App/AnimationEditor.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ needs.meta.outputs.version }}
          -o dist/publish

      - name: Mark binary executable (non-Windows)
        if: matrix.os != 'windows-latest'
        run: chmod +x dist/publish/${{ matrix.mainExe }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous channel release for delta generation
        shell: pwsh
        run: |
          $channel = "${{ matrix.rid }}-${{ needs.meta.outputs.channel }}"

          vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --channel $channel `
            --pre ${{ needs.meta.outputs.prerelease }} `
            --outputDir dist/out `
            --token ${{ secrets.GITHUB_TOKEN }}

          if ($LASTEXITCODE -ne 0) {
            Write-Warning "No prior published release was found for '$channel'. Continuing without a delta baseline."
          }

      - name: Package portable Velopack release
        shell: pwsh
        run: |
          $channel = "${{ matrix.rid }}-${{ needs.meta.outputs.channel }}"

          vpk pack `
            --packId AnimationEditor `
            --packVersion ${{ needs.meta.outputs.version }} `
            --packDir dist/publish `
            --mainExe ${{ matrix.mainExe }} `
            --runtime ${{ matrix.rid }} `
            --channel $channel `
            --outputDir dist/out

      - name: Upload Velopack artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ matrix.rid }}-${{ needs.meta.outputs.channel }}
          path: dist/out/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest

    steps:
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List generated assets
        run: find dist -type f -print

      - name: Create or update GitHub Release
        shell: pwsh
        run: |
          $repoUrl = "https://github.com/${{ github.repository }}"
          $releaseFolders = Get-ChildItem -Path dist -Directory | Sort-Object Name

          if ($releaseFolders.Count -eq 0) {
            throw "No Velopack release artifacts were found."
          }

          $firstUpload = $true

          foreach ($folder in $releaseFolders) {
            # Artifact name is velopack-{rid}-{releaseKind}.
            # Remove the prefix to reconstruct the corresponding Velopack channel.
            $channel = $folder.Name -replace '^velopack-', ''

            $arguments = @(
              'upload',
              'github',
              '--repoUrl', $repoUrl,
              '--outputDir', $folder.FullName,
              '--channel', $channel,
              '--tag', '${{ needs.meta.outputs.tag }}',
              '--releaseName', '${{ needs.meta.outputs.title }}',
              '--targetCommitish', '${{ github.sha }}',
              '--token', '${{ secrets.GITHUB_TOKEN }}'
            )

            if ('${{ needs.meta.outputs.prerelease }}' -eq 'true') {
              $arguments += @('--pre', 'true')
            }

            if ('${{ needs.meta.outputs.publish }}' -eq 'true') {
              $arguments += @('--publish', 'true')
            }

            if (-not $firstUpload) {
              $arguments += @('--merge', 'true')
            }

            Write-Host "Uploading Velopack channel '$channel' from '$($folder.FullName)'"
            vpk @arguments

            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Unable to obtain a delta baseline for '$channel'. The release will contain a full package only."
            }

            $firstUpload = $false
          }