name: Build and Release Animation Editor

on:
  workflow_dispatch:
    inputs:
      release_kind:
        description: 'Type'
        type: choice
        options: [release, prerelease, test]
        default: test
        required: true

permissions:
  contents: write

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      title: ${{ steps.meta.outputs.title }}
      prerelease: ${{ steps.meta.outputs.prerelease }}
      channel: ${{ steps.meta.outputs.channel }}

    steps:
      - name: Compute version, tag, title, and release metadata
        id: meta
        shell: pwsh
        run: |
          $now = Get-Date
          $kind = "${{ github.event.inputs.release_kind }}"
          $refName = "${{ github.ref_name }}"
          $runNumber = $env:GITHUB_RUN_NUMBER

          # Release and prerelease are intended to represent main.
          # Test may run from any branch selected in the Actions UI.
          if ($kind -in @('release', 'prerelease') -and $refName -ne 'main') {
            throw "'$kind' releases must be run from main. Selected ref: '$refName'."
          }

          # Valid SemVer and unique per workflow run.
          # Example: 2026.7.123
          $version = "$($now.Year).$($now.Month).$runNumber"

          switch ($kind) {
            'release' {
              $prefix = 'Release'
              $isPrerelease = 'false'
              $channel = 'release'
            }

            'prerelease' {
              $prefix = 'PreRelease'
              $isPrerelease = 'true'
              $channel = 'prerelease'
            }

            'test' {
              $prefix = 'Test'
              $isPrerelease = 'true'
              $channel = 'test'
            }

            default {
              throw "Unknown release kind: $kind"
            }
          }

          $testBranchSuffix = if ($kind -eq 'test') {
            " [$refName]"
          }
          else {
            ''
          }

          $title = "Animation Editor $prefix " +
                   $now.ToString('MMMM d, yyyy') +
                   "$testBranchSuffix (Build $runNumber)"

          $tag = "ae-$prefix" +
                 "_" + $now.ToString('MMMM_dd_yyyy') +
                 "-$runNumber"

          "version=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "title=$title" >> $env:GITHUB_OUTPUT
          "prerelease=$isPrerelease" >> $env:GITHUB_OUTPUT
          "channel=$channel" >> $env:GITHUB_OUTPUT

  # Uncomment when you are ready to restore test gating.
  #
  # test:
  #   runs-on: ubuntu-latest
  #
  #   steps:
  #     - name: Checkout code
  #       uses: actions/checkout@v4
  #
  #     - name: Install .NET SDK
  #       uses: actions/setup-dotnet@v4
  #       with:
  #         dotnet-version: '10.0.x'
  #
  #     - name: Test AnimationEditor solution
  #       run: dotnet test tools/AnimationEditorAvalonia/AnimationEditorAvalonia.slnx -c Release

  build:
    needs: [meta]
    # Change to [meta, test] after restoring the test job.

    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
            mainExe: AnimationEditor.exe

          - rid: linux-x64
            os: ubuntu-latest
            mainExe: AnimationEditor

          - rid: osx-x64
            os: macos-latest
            mainExe: AnimationEditor

          - rid: osx-arm64
            os: macos-latest
            mainExe: AnimationEditor

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: >
          dotnet restore
          tools/AnimationEditorAvalonia/src/AnimationEditor.App/AnimationEditor.App.csproj
          -r ${{ matrix.rid }}

      - name: Publish (${{ matrix.rid }})
        run: >
          dotnet publish
          tools/AnimationEditorAvalonia/src/AnimationEditor.App/AnimationEditor.App.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ needs.meta.outputs.version }}
          -o dist/publish

      - name: Mark binary executable (non-Windows)
        if: matrix.os != 'windows-latest'
        run: chmod +x dist/publish/${{ matrix.mainExe }}

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous channel release for delta generation
        shell: pwsh
        env:
          VPK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VPK_TOKEN)) {
            throw "VPK_TOKEN was not provided to this step."
          }

          $channel = "${{ matrix.rid }}-${{ needs.meta.outputs.channel }}"

          vpk download github `
            --repoUrl "https://github.com/${{ github.repository }}" `
            --channel $channel `
            --pre ${{ needs.meta.outputs.prerelease }} `
            --outputDir dist/out `
            --token $env:VPK_TOKEN

          if ($LASTEXITCODE -ne 0) {
            Write-Warning "Unable to download a delta baseline for '$channel'. This release will contain a full package only."
            exit 0
          }

      - name: Package Velopack release
        shell: pwsh
        run: |
          $channel = "${{ matrix.rid }}-${{ needs.meta.outputs.channel }}"

          vpk pack `
            --packId AnimationEditor `
            --packVersion ${{ needs.meta.outputs.version }} `
            --packDir dist/publish `
            --mainExe ${{ matrix.mainExe }} `
            --runtime ${{ matrix.rid }} `
            --channel $channel `
            --outputDir dist/out

      - name: Upload Velopack artifact
        uses: actions/upload-artifact@v4
        with:
          name: velopack-${{ matrix.rid }}-${{ needs.meta.outputs.channel }}
          path: dist/out/*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [meta, build]
    runs-on: ubuntu-latest

    steps:
      - name: Install .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: List generated assets
        run: find dist -type f -print

      - name: Create or update GitHub Release
        shell: pwsh
        env:
          VPK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:VPK_TOKEN)) {
            throw "VPK_TOKEN was not provided to this step."
          }

          $repoUrl = "https://github.com/${{ github.repository }}"
          $releaseFolders = @(
            Get-ChildItem -Path dist -Directory | Sort-Object Name
          )

          if ($releaseFolders.Count -eq 0) {
            throw "No Velopack release artifacts were found."
          }

          $firstUpload = $true

          foreach ($folder in $releaseFolders) {
            # Artifact name: velopack-{rid}-{releaseKind}
            # Example: velopack-win-x64-test
            $channel = $folder.Name -replace '^velopack-', ''

            $arguments = @(
              'upload',
              'github',
              '--repoUrl', $repoUrl,
              '--token', $env:VPK_TOKEN,
              '--outputDir', $folder.FullName,
              '--channel', $channel,
              '--tag', '${{ needs.meta.outputs.tag }}',
              '--releaseName', '${{ needs.meta.outputs.title }}',
              '--targetCommitish', '${{ github.sha }}',
              '--publish'
            )

            if ('${{ needs.meta.outputs.prerelease }}' -eq 'true') {
              $arguments += @('--pre', 'true')
            }

            if (-not $firstUpload) {
              $arguments += @('--merge', 'true')
            }

            Write-Host "Uploading Velopack channel '$channel' from '$($folder.FullName)'"
            vpk @arguments

            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }

            $firstUpload = $false
          }